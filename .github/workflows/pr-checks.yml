name: Generator API PR Checks

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - 'feature/**'

concurrency:
  group: pr-checks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  code_quality:
    name: Code Quality
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Maven verify (skip tests)
        run: ./mvnw --batch-mode --no-transfer-progress verify -DskipTests

  tests:
    name: Tests
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Maven clean verify
        run: ./mvnw --batch-mode --no-transfer-progress clean verify
