name: Generator API CI/CD Pipeline

on:
  pull_request:
    branches:
      - develop
      - master
  push:
    branches:
      - develop
      - master

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  code_quality:
    name: Code Quality
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Maven verify (skip tests)
        run: ./mvnw --batch-mode --no-transfer-progress verify -DskipTests

  qodana:
    name: Qodana Scan
    needs: code_quality
    uses: ./.github/workflows/qodana_code_quality.yml
    permissions:
      contents: read
      pull-requests: write
      checks: write
    secrets:
      QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}

  tests:
    name: Tests
    runs-on: self-hosted
    needs:
      - code_quality
      - qodana
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Maven clean verify
        run: ./mvnw --batch-mode --no-transfer-progress clean verify

  codeql:
    name: CodeQL Analysis
    runs-on: self-hosted
    needs: tests
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java-kotlin
          build-mode: manual

      - name: Build project for CodeQL
        run: ./mvnw --batch-mode --no-transfer-progress clean compile -DskipTests

      - name: Analyze with CodeQL
        uses: github/codeql-action/analyze@v3

  docker:
    name: Generator API Docker Build and Push
    runs-on: self-hosted
    needs: codeql
    if: ${{ github.event_name == 'push' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build application jar
        run: ./mvnw --batch-mode --no-transfer-progress clean package -DskipTests

      - name: Extract Maven project version
        id: app_version
        run: |
          set -euo pipefail
          APP_VERSION="$(./mvnw -q -DforceStdout help:evaluate -Dexpression=project.version)"
          echo "version=${APP_VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push image tags
        env:
          IMAGE_NAME: scaffoldops/generator-api
          APP_VERSION: ${{ steps.app_version.outputs.version }}
        run: |
          set -euo pipefail
          docker build -f Dockerfile \
            -t ${IMAGE_NAME}:${APP_VERSION} \
            -t ${IMAGE_NAME}:${{ github.sha }} \
            -t ${IMAGE_NAME}:latest \
            .
          docker push ${IMAGE_NAME}:${APP_VERSION}
          docker push ${IMAGE_NAME}:${{ github.sha }}
          docker push ${IMAGE_NAME}:latest

  deploy:
    name: Deploy generator-api to Minikube
    needs: docker
    if: ${{ github.event_name == 'push' }}
    uses: ./.github/workflows/deploy-k8s.yml
    with:
      namespace: scaffoldops
      image_version: ${{ github.sha }}
