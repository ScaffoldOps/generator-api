name: Generator API CI/CD Pipeline

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - '**'
  schedule:
    - cron: '0 2 * * *'

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  code_quality:
    name: Code Quality
    if: ${{ github.event_name != 'schedule' }}
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Maven verify (skip tests)
        run: ./mvnw --batch-mode --no-transfer-progress verify -DskipTests

  qodana:
    name: Qodana Scan
    if: ${{ github.event_name == 'pull_request' }}
    needs:
      - code_quality
    uses: ./.github/workflows/qodana_code_quality.yml
    permissions:
      contents: read
      pull-requests: write
      checks: write
    secrets:
      QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}

  tests:
    name: Tests
    if: ${{ github.event_name != 'schedule' }}
    runs-on: self-hosted
    needs:
      - code_quality
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Maven clean verify
        run: ./mvnw --batch-mode --no-transfer-progress clean verify

  codeql:
    name: CodeQL Analysis
    if: ${{ github.event_name == 'schedule' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
    runs-on: self-hosted
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java-kotlin
          build-mode: manual

      - name: Build project for CodeQL
        run: ./mvnw --batch-mode --no-transfer-progress clean compile -DskipTests

      - name: Analyze with CodeQL
        uses: github/codeql-action/analyze@v3

  docker:
    name: Generator API Docker Build
    if: ${{ github.event_name != 'schedule' }}
    runs-on: self-hosted
    needs:
      - tests
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build application jar
        run: ./mvnw --batch-mode --no-transfer-progress clean package -DskipTests

      - name: Extract Maven project version
        id: app_version
        run: |
          set -euo pipefail
          APP_VERSION="$(./mvnw -q -DforceStdout help:evaluate -Dexpression=project.version)"
          echo "version=${APP_VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Log in to Docker Hub
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            victodomvar/scaffoldops-generator-api:${{ steps.app_version.outputs.version }}
            victodomvar/scaffoldops-generator-api:${{ github.sha }}
            victodomvar/scaffoldops-generator-api:latest

  deploy:
    name: Deploy generator-api to Minikube
    needs:
      - docker
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    uses: ./.github/workflows/deploy-k8s.yml
    with:
      namespace: scaffoldops
      image_version: ${{ github.sha }}
