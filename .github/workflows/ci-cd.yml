name: Generator API CI/CD Pipeline

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - '**'
  schedule:
    - cron: '0 2 * * *'

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  code_quality:
    name: Code Quality
    if: ${{ github.event_name != 'schedule' }}
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Maven verify (skip tests)
        run: ./mvnw --batch-mode --no-transfer-progress verify -DskipTests

  qodana:
    name: Qodana Scan
    if: ${{ github.event_name == 'pull_request' }}
    uses: ./.github/workflows/qodana_code_quality.yml
    permissions:
      contents: read
      pull-requests: write
      checks: write
    secrets:
      QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}

  tests:
    name: Tests
    if: ${{ github.event_name != 'schedule' }}
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Maven clean verify
        run: ./mvnw --batch-mode --no-transfer-progress clean verify

  codeql:
    name: CodeQL Analysis
    if: ${{ github.event_name == 'schedule' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
    runs-on: self-hosted
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java-kotlin
          build-mode: manual

      - name: Build project for CodeQL
        run: ./mvnw --batch-mode --no-transfer-progress clean compile -DskipTests

      - name: Analyze with CodeQL
        uses: github/codeql-action/analyze@v3

  docker_build:
    name: Generator API Docker Build
    if: >-
      ${{
        always() &&
        github.event_name != 'schedule' &&
        needs.code_quality.result == 'success' &&
        needs.tests.result == 'success' &&
        (needs.qodana.result == 'success' || needs.qodana.result == 'skipped') &&
        (needs.codeql.result == 'success' || needs.codeql.result == 'skipped')
      }}
    runs-on: self-hosted
    outputs:
      app_version: ${{ steps.image_metadata.outputs.app_version }}
      short_sha: ${{ steps.image_metadata.outputs.short_sha }}
      immutable_tag: ${{ steps.image_metadata.outputs.immutable_tag }}
      branch_tag: ${{ steps.image_metadata.outputs.branch_tag }}
    needs:
      - code_quality
      - tests
      - qodana
      - codeql
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build application jar
        run: ./mvnw --batch-mode --no-transfer-progress clean package -DskipTests

      - name: Compute image metadata
        id: image_metadata
        run: |
          set -euo pipefail
          APP_VERSION="$(./mvnw -q -DforceStdout help:evaluate -Dexpression=project.version)"
          SHORT_SHA="$(git rev-parse --short HEAD)"
          IMMUTABLE_TAG="${APP_VERSION}-${SHORT_SHA}"

          if [ "${GITHUB_REF}" = "refs/heads/develop" ]; then
            BRANCH_TAG="develop"
          elif [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            BRANCH_TAG="main"
          else
            BRANCH_TAG=""
          fi

          echo "app_version=${APP_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "short_sha=${SHORT_SHA}" >> "${GITHUB_OUTPUT}"
          echo "immutable_tag=${IMMUTABLE_TAG}" >> "${GITHUB_OUTPUT}"
          echo "branch_tag=${BRANCH_TAG}" >> "${GITHUB_OUTPUT}"

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: |
            victodomvar/scaffoldops-generator-api:${{ steps.image_metadata.outputs.immutable_tag }}

  docker_push:
    name: Generator API Docker Push
    if: >-
      ${{
        github.event_name == 'push' &&
        needs.docker_build.result == 'success' &&
        (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main')
      }}
    runs-on: self-hosted
    needs:
      - docker_build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build application jar
        run: ./mvnw --batch-mode --no-transfer-progress clean package -DskipTests

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            victodomvar/scaffoldops-generator-api:${{ needs.docker_build.outputs.immutable_tag }}
            victodomvar/scaffoldops-generator-api:${{ needs.docker_build.outputs.branch_tag }}

  deploy:
    name: Deploy generator-api to Minikube
    needs:
      - docker_build
      - docker_push
    if: >-
      ${{
        github.event_name == 'push' &&
        needs.docker_build.result == 'success' &&
        needs.docker_push.result == 'success' &&
        (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main')
      }}
    uses: ./.github/workflows/deploy-k8s.yml
    with:
      namespace: ${{ github.ref == 'refs/heads/develop' && 'scaffoldops-dev' || 'scaffoldops-pre' }}
      environment_name: ${{ github.ref == 'refs/heads/develop' && 'DEV' || 'STAGING/PRE' }}
      image_version: ${{ needs.docker_build.outputs.immutable_tag }}
