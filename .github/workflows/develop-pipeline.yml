name: Generator API Develop Pipeline

on:
  push:
    branches:
      - develop

concurrency:
  group: develop-pipeline-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  code_quality:
    name: Code Quality
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Maven verify (skip tests)
        run: ./mvnw --batch-mode --no-transfer-progress verify -DskipTests

  tests:
    name: Tests
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Maven clean verify
        run: ./mvnw --batch-mode --no-transfer-progress clean verify

  docker_build:
    name: Docker Build
    runs-on: self-hosted
    needs:
      - code_quality
      - tests
    outputs:
      immutable_tag: ${{ steps.image_metadata.outputs.immutable_tag }}
      branch_tag: ${{ steps.image_metadata.outputs.branch_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build application jar
        run: ./mvnw --batch-mode --no-transfer-progress clean package -DskipTests

      - name: Compute image metadata
        id: image_metadata
        run: |
          set -euo pipefail
          APP_VERSION="$(./mvnw -q -DforceStdout help:evaluate -Dexpression=project.version)"
          SHORT_SHA="$(git rev-parse --short HEAD)"

          echo "immutable_tag=${APP_VERSION}-${SHORT_SHA}" >> "${GITHUB_OUTPUT}"
          echo "branch_tag=develop" >> "${GITHUB_OUTPUT}"

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: |
            victodomvar/scaffoldops-generator-api:${{ steps.image_metadata.outputs.immutable_tag }}

  docker_push:
    name: Docker Push
    runs-on: self-hosted
    needs:
      - docker_build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build application jar
        run: ./mvnw --batch-mode --no-transfer-progress clean package -DskipTests

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            victodomvar/scaffoldops-generator-api:${{ needs.docker_build.outputs.immutable_tag }}
            victodomvar/scaffoldops-generator-api:${{ needs.docker_build.outputs.branch_tag }}

  deploy:
    name: Deploy to DEV
    needs:
      - docker_build
      - docker_push
    uses: ./.github/workflows/deploy-k8s.yml
    with:
      namespace: scaffoldops-dev
      environment_name: DEV
      spring_profile: dev
      image_version: ${{ needs.docker_build.outputs.immutable_tag }}
