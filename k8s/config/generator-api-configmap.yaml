apiVersion: v1
kind: ConfigMap
metadata:
  name: generator-api-config
  namespace: scaffoldops
data:
  application.yml: |
    server:
      port: 8080

    spring:
      application:
        name: generator-api
      mvc:
        servlet:
          path: /api/generator/v1
      datasource:
        url: jdbc:postgresql://generator-api-db-service:5432/generatorapidb

    logging:
      level:
        root: INFO

    management:
      health:
        livenessstate:
          enabled: true
        readinessstate:
          enabled: true
      endpoint:
        health:
          probes:
            enabled: true
      endpoints:
        web:
          base-path: /actuator
          exposure:
            include: health,info

    springdoc:
      api-docs:
        path: /v3/api-docs
      swagger-ui:
        path: /swagger-ui.html
