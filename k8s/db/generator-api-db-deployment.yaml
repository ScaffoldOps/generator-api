apiVersion: apps/v1
kind: Deployment
metadata:
  name: generator-api-db-deployment
  namespace: scaffoldops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: generator-api-db
  template:
    metadata:
      labels:
        app: generator-api-db
    spec:
      containers:
        - name: generator-api-db
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: "generatorapidb"
            - name: POSTGRES_USER
              value: "generatorapiuser"
            - name: POSTGRES_PASSWORD
              value: "generatorapipassword"
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: generator-api-postgres-pvc
