apiVersion: apps/v1
kind: Deployment
metadata:
  name: generator-api-deployment
  namespace: scaffoldops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: generator-api
  template:
    metadata:
      labels:
        app: generator-api
    spec:
      containers:
        - name: generator-api
          image: scaffoldops/generator-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: generator-api-config
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://$(DB_HOST):$(DB_PORT)/$(DB_NAME)"
            - name: SPRING_DATASOURCE_USERNAME
              value: "generatorapiuser"
            - name: SPRING_DATASOURCE_PASSWORD
              value: "generatorapipassword"
            - name: LOGGING_LEVEL_ROOT
              value: "$(LOG_LEVEL)"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
