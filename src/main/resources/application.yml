server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: generator-api
  mvc:
    servlet:
      path: /api/generator/v1
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
    open-in-view: false

info:
  app:
    title: ScaffoldOps Generator API
    description: API for submitting and tracking scaffold generation requests.
    version: 0.0.1-SNAPSHOT

management:
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:generatorapidb}
    username: ${DB_USERNAME:generatorapiuser}
    password: ${DB_PASSWORD:generatorapipassword}
