server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: generator-api
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI:http://localhost:8091/realms/scaffoldops}
  mvc:
    servlet:
      path: /api/generator/v1
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    open-in-view: false

info:
  app:
    title: ScaffoldOps Generator API
    description: API for submitting and tracking scaffold generation requests.
    version: 0.0.1-SNAPSHOT

app:
  kafka:
    topics:
      generation-requested: ${GENERATION_REQUESTED_TOPIC:generation-requested}

management:
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
